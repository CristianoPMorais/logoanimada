<html lang="pt-BR"><head>
<meta charset="UTF-8">
<title>Logo Cinematográfico</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* container principal */

.container{
position:relative;
width:600px;
height:300px;
animation:intro 2.5s ease-out;
}

/* energia girando */

.energia{
position:absolute;
width:600px;
height:300px;
border-radius:50%;
background:radial-gradient(circle, rgba(0,200,255,0.9), transparent 70%);
filter:blur(35px);
animation:energia 6s linear infinite;
}

/* olho */

.olho{
position:absolute;
width:100%;
z-index:3;
}

/* América do Sul */

.america{
position:absolute;
width:120px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:girar 6s linear infinite;
z-index:2;
}

/* piscar */

.palpebra{
position:absolute;
width:100%;
height:100%;
background:black;
top:-100%;
z-index:5;
animation:piscar 7s infinite;
}

/* partículas */

.particula{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.9;
animation:subir 4s linear infinite;
}

/* animações */

@keyframes intro{
0%{
transform:scale(0.2);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes girar{
from{
transform:translate(-50%,-50%) rotate(0deg);
}
to{
transform:translate(-50%,-50%) rotate(360deg);
}
}

@keyframes energia{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes piscar{

0%{top:-100%}
85%{top:-100%}

88%{top:0}

92%{top:-100%}

100%{top:-100%}

}

@keyframes subir{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-300px);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">





<img src="olho.png" class="olho">

<div class="palpebra"></div>

</div>

p.style.left=Math.random()*window.innerWidth+"px"
p.style.top=Math.random()*window.innerHeight+"px"

p.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(p)

}
